<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roguelike Dungeon Crawler</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #canvas {
            display: block;
            border: none;
            image-rendering: pixelated;
        }
        #info-panel {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 850;
        }
        #stats,
        #messages {
            position: fixed;
            box-sizing: border-box;
            padding: 12px 14px;
            background: rgba(10, 10, 10, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
        }
        #stats {
            top: 12px;
            right: 12px;
            width: min(320px, calc(100vw - 24px));
            max-height: min(70vh, 640px);
            overflow: hidden;
        }
        #messages {
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            width: min(720px, calc(100vw - 24px));
            max-height: min(30vh, 220px);
            overflow: hidden;
        }
        #stats h3,
        #messages h3 {
            margin: 0 0 8px;
            font-size: 16px;
        }
        #stats p,
        #messages p {
            margin: 0 0 4px;
            line-height: 1.25;
        }
        #inventory-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #222;
            border: 1px solid #555;
            padding: 20px;
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }
        #map-overlay {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            transform: none;
            background: rgba(10, 10, 10, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.22);
            padding: 8px;
            z-index: 900;
            width: min(28vw, 220px);
            box-sizing: border-box;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }
        #map-overlay h3,
        #map-overlay button {
            display: none;
        }
        #map-canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(0, 0, 0, 0.5);
        }
        .inventory-item {
            margin: 5px 0;
            cursor: pointer;
        }
        .inventory-item:hover {
            background-color: #333;
        }
        @media (max-width: 900px) {
            #stats {
                top: 8px;
                right: 8px;
                width: min(280px, calc(100vw - 16px));
                padding: 10px 12px;
            }
            #messages {
                bottom: 8px;
                width: calc(100vw - 16px);
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" tabindex="0"></canvas>
        <div id="info-panel">
            <div id="stats"></div>
            <div id="messages"></div>
        </div>
    </div>
    <div id="inventory-modal">
        <h3>Inventory</h3>
        <div id="inventory-list"></div>
        <button id="close-inventory">Close</button>
    </div>
    <div id="map-overlay" aria-hidden="true">
        <h3>Map</h3>
        <canvas id="map-canvas"></canvas>
    </div>
    <script src="config/constants.js"></script>
    <script src="config/rules.js"></script>
    <script src="config/terrain-constants.js"></script>
    <script src="config/input-constants.js"></script>
    <script src="config/generation-constants.js"></script>
    <script src="config/enemy-definitions.js"></script>
    <script src="config/combat-rules.js"></script>
    <script src="engine/random.js"></script>
    <script src="engine/utils.js"></script>
    <script src="engine/actor-helpers.js"></script>
    <script src="engine/pathfinding.js"></script>
    <script src="engine/tileset.js"></script>
    <script src="engine/fov.js"></script>
    <script src="engine/world.js"></script>
    <script src="engine/world-actors.js"></script>
    <script src="engine/world-tile-state.js"></script>
    <script src="engine/world-traversal.js"></script>
    <script src="engine/world-generation.js"></script>
    <script src="entities/item.js"></script>
    <script src="entities/item-data.js"></script>
    <script src="entities/item-factories.js"></script>
    <script src="entities/player.js"></script>
    <script src="entities/player-combat.js"></script>
    <script src="entities/player-inventory.js"></script>
    <script src="entities/player-progression.js"></script>
    <script src="entities/enemy.js"></script>
    <script src="entities/enemy-item-behaviors.js"></script>
    <script src="entities/enemy-ai.js"></script>
    <script src="entities/enemy-progression.js"></script>
    <script src="entities/enemy-combat.js"></script>
    <script src="ui/ui.js"></script>
    <script src="ui/ui-rendering.js"></script>
    <script src="ui/ui-panels.js"></script>
    <script src="ui/ui-inventory.js"></script>
    <script src="ui/ui-map.js"></script>
    <script src="game/game.js"></script>
    <script src="game/game-input.js"></script>
    <script src="game/game-turn-results.js"></script>
    <script src="game/game-npc-interactions.js"></script>
    <script src="game/game-combat-helpers.js"></script>
    <script src="game/game-content-utils.js"></script>
    <script src="game/game-content-registry.js"></script>
    <script src="game/game-content.js"></script>
    <script src="game/game-enemy-content.js"></script>
    <script src="game/game-item-generation.js"></script>
    <script src="game/game-item-state.js"></script>
    <script src="game/game-item-interactions.js"></script>
    <script src="game/game-player-turns.js"></script>
    <script src="game/game-enemy-turns.js"></script>
</body>
</html>
