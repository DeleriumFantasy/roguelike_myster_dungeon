<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roguelike Dungeon Crawler</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            border: none;
            image-rendering: pixelated;
        }
        #pixi-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }
        #pixi-overlay canvas {
            display: block;
            image-rendering: pixelated;
        }
        #info-panel {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 850;
        }
        #stats,
        #messages {
            position: fixed;
            box-sizing: border-box;
            padding: 12px 14px;
            background: rgba(10, 10, 10, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
        }
        #stats {
            top: 12px;
            right: 12px;
            width: min(320px, calc(100vw - 24px));
            max-height: min(70vh, 640px);
            overflow: hidden;
        }
        #messages {
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            width: min(720px, calc(100vw - 24px));
            max-height: min(30vh, 220px);
            overflow: hidden;
        }
        #stats h3,
        #messages h3 {
            margin: 0 0 8px;
            font-size: 16px;
        }
        #stats p,
        #messages p {
            margin: 0 0 4px;
            line-height: 1.25;
        }
        #inventory-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #222;
            border: 1px solid #555;
            padding: 20px;
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }
        #inventory-item-details {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            width: min(320px, 42vw);
            max-width: calc(100vw - 24px);
            box-sizing: border-box;
            background: rgba(12, 12, 12, 0.95);
            border: 1px solid #555;
            padding: 12px;
            z-index: 1200;
            pointer-events: none;
        }
        #inventory-item-details h4 {
            margin: 0 0 8px;
            font-size: 14px;
        }
        #inventory-item-details p {
            margin: 0 0 4px;
            line-height: 1.25;
        }
        #settings-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #222;
            border: 1px solid #555;
            padding: 20px;
            z-index: 1000;
            min-width: 320px;
        }
        #settings-modal h3 {
            margin: 0 0 16px;
            font-size: 16px;
        }
        #settings-modal label {
            display: block;
            margin-bottom: 12px;
            cursor: pointer;
        }
        #settings-modal input[type="checkbox"] {
            margin-right: 8px;
        }
        #settings-modal button {
            margin-top: 8px;
        }
        #dungeon-selection-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #222;
            border: 1px solid #555;
            padding: 20px;
            z-index: 1100;
            width: min(420px, calc(100vw - 24px));
            box-sizing: border-box;
        }
        #dungeon-selection-modal h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }
        #dungeon-selection-modal p {
            margin: 0 0 12px;
            color: #ddd;
        }
        #dungeon-selection-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        .dungeon-selection-option {
            background: #111;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 10px;
            text-align: left;
            cursor: pointer;
        }
        .dungeon-selection-option:hover {
            background: #333;
        }
        .inventory-item {
            margin: 5px 0;
            cursor: pointer;
        }
        .inventory-item:hover {
            background-color: #333;
        }
        @media (max-width: 900px) {
            #stats {
                top: 8px;
                right: 8px;
                width: min(280px, calc(100vw - 16px));
                padding: 10px 12px;
            }
            #messages {
                bottom: 8px;
                width: calc(100vw - 16px);
                padding: 10px 12px;
            }
            #inventory-item-details {
                width: min(320px, calc(100vw - 24px));
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" tabindex="0"></canvas>
        <div id="pixi-overlay" aria-hidden="true"></div>
        <div id="info-panel">
            <div id="stats"></div>
            <div id="messages"></div>
        </div>
    </div>
    <div id="inventory-modal">
        <h3 id="inventory-title">Inventory</h3>
        <div id="inventory-list"></div>
        <button id="close-inventory">Close</button>
    </div>
    <div id="inventory-item-details" aria-live="polite">
        <h4>Item Details</h4>
        <div id="inventory-item-details-content"></div>
    </div>
    <div id="settings-modal">
        <h3>Settings</h3>
        <label>
            <input type="checkbox" id="setting-descend-immediately">
            Auto-explore: descend stairs immediately
        </label>
        <label>
            <input type="checkbox" id="setting-allies-passive">
            Allies: passive mode (flee enemies instead of attacking)
        </label>
        <button id="close-settings">Close</button>
    </div>
    <div id="dungeon-selection-modal">
        <h3>Choose A Dungeon</h3>
        <p>Select where the stairs will take you.</p>
        <div id="dungeon-selection-list"></div>
        <button id="close-dungeon-selection">Cancel</button>
    </div>
    <script src="config/constants.js"></script>
    <script src="config/rules.js"></script>
    <script src="config/terrain-constants.js"></script>
    <script src="config/input-constants.js"></script>
    <script src="config/generation-constants.js"></script>
    <script src="config/enemy-definitions.js"></script>
    <script src="config/combat-rules.js"></script>
    <script src="engine/random.js"></script>
    <script src="engine/utils.js"></script>
    <script src="engine/actor-helpers.js"></script>
    <script src="engine/pathfinding.js"></script>
    <script src="engine/tileset.js"></script>
    <script src="engine/fov.js"></script>
    <script src="engine/world.js"></script>
    <script src="engine/world-actors.js"></script>
    <script src="engine/world-tile-state.js"></script>
    <script src="engine/world-traversal.js"></script>
    <script src="engine/world-generation.js"></script>
    <script src="entities/item.js"></script>
    <script src="entities/item-data.js"></script>
    <script src="entities/item-factories.js"></script>
    <script src="entities/player.js"></script>
    <script src="entities/combat-utils.js"></script>
    <script src="entities/player-combat.js"></script>
    <script src="entities/player-inventory.js"></script>
    <script src="entities/player-progression.js"></script>
    <script src="entities/enemy.js"></script>
    <script src="entities/enemy-item-behaviors.js"></script>
    <script src="entities/enemy-ai.js"></script>
    <script src="entities/enemy-progression.js"></script>
    <script src="entities/enemy-combat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
    <script src="ui/ui-pixi-overlay.js"></script>
    <script src="ui/ui-pixi-sprites.js"></script>
    <script src="ui/ui-pixi-render-state.js"></script>
    <script src="ui/ui-pixi-layers.js"></script>
    <script src="ui/ui-pixi-actors.js"></script>
    <script src="ui/ui-pixi-effects.js"></script>
    <script src="ui/ui.js"></script>
    <!-- <script src="ui/ui-rendering.js"></script> -->
    <script src="ui/ui-panels.js"></script>
    <script src="ui/ui-inventory.js"></script>
    <script src="game/game.js"></script>
    <script src="game/game-input.js"></script>
    <script src="game/game-turn-results.js"></script>
    <script src="game/game-npc-interactions.js"></script>
    <script src="game/game-combat-helpers.js"></script>
    <script src="game/game-content-utils.js"></script>
    <script src="game/game-content-registry.js"></script>
    <script src="game/game-content.js"></script>
    <script src="game/game-enemy-content.js"></script>
    <script src="game/game-item-generation.js"></script>
    <script src="game/game-item-state.js"></script>
    <script src="game/game-inventory-actions.js"></script>
    <script src="game/game-item-interactions.js"></script>
    <script src="game/game-player-turns.js"></script>
    <script src="game/game-enemy-turns.js"></script>
    <script src="game/game-explore.js"></script>
</body>
</html>
